<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARGUS Control | Executive Intelligence</title>
    <style>
      :root {
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --bg-sand: #F7F6F3;
        --text-charcoal: #1A1A1A;
        --accent-gold: #C5A059;
        --sidebar-neutral: #EDE9E3;
        --qualified-green: #2D5A27;
        --urgent-burgundy: #9B1B1B;
      }
      body {
        font-family: var(--font-main);
        background-color: var(--bg-sand);
        color: var(--text-charcoal);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        overflow-x: hidden;
      }
      /* 2026 Executive Minimalist Card Design */
      .card-white {
        background-color: #FFFFFF;
        border-radius: 12px;
        box-shadow: 0 2px 12px -1px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(0, 0, 0, 0.03);
      }
      /* Solid Luxury Accents */
      .btn-gold {
        background-color: var(--accent-gold);
        color: #1A1A1A; /* High contrast: Charcoal on Gold */
        transition: all 0.2s ease;
        border-radius: 8px;
        font-weight: 600;
      }
      .btn-gold:hover {
        filter: brightness(1.05);
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
